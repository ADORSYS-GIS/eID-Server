[package]
name = "eid-server"
version = "0.1.0"
edition = "2024"

[dependencies]
# Web server framework
axum = { version = "0.8.3", features = ["macros"] }
axum-server = { version = "0.6.0", features = ["tls-rustls"] }

# Web framework dependencies
hyper = { version = "0.14", features = ["client", "http1"] }
tower-http = { version = "0.5.2", features = ["cors", "trace"] }

# Async runtime
tokio = { version = "1.38.0", features = ["full"] }
tokio-stream = "0.1.15"
tonic = "0.9.2"
tower = "0.4.13"

# Web framework dependencies

# Async runtime
tokio-rustls = "0.25"  # Compatible with rustls 0.23

# Error handling
thiserror = "1.0.61"
color-eyre = "0.6"

# XML handling
quick-xml = { version = "0.37.5", features = ["serialize"] }

# Serialization / Deserialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.117"

# Configuration
config = "0.15"


# Logging and tracing
tempfile = "3.20.0"

# Logging and metrics
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
dotenvy = "0.15"
rustls-pemfile = "2.0"
rustls = "0.23.28" 
# Utilities
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
base64 = "0.22.1"
rand = "0.9.1"
async-trait = "0.1"
reqwest = { version = "0.12.8", default-features = false, features = ["json", "rustls-tls"] }  # Use rustls-tls
urlencoding = "2.1"
flate2 = "1.0"

# TLS dependencies
rcgen = "0.11.1"

# PSK dependencies
openssl = { version = "0.10", features = ["v111"] }
openssl-sys = "0.9"
tokio-openssl = "0.6"
http = "1.3.1"
bytes = "1.10.1"
futures-util = "0.3.31"
lazy_static = "1.4.0"
libc = "0.2"
hyper-rustls = "0.24"

# Cryptographic dependencies
ring = "0.17"
x509-parser = "0.15"
lru = "0.12"
hex = "0.4"
pem = "3.0"

[dev-dependencies]
http-body-util = "0.1"
reqwest = { version = "0.11.18", features = ["json"] }
once_cell = "1.19.0"
tempfile = "3.10.1"

color-eyre = "0.6"
base64 = "0.22.1"
url = "2.5.4"
libflate = "2.1.0"
openssl = "0.10.72"


[profile.dev.package.backtrace]
opt-level = 3
